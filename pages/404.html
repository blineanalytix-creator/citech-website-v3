<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 – Seite nicht gefunden | CITECH AI</title>
    <meta name="description" content="Die angeforderte Seite wurde nicht gefunden. Zurück zur Startseite von CITECH AI.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preload" href="../assets/fonts/Inter-VariableFont.woff2" as="font" type="font/woff2" crossorigin>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('../assets/fonts/Inter-VariableFont.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }
    </style>

    <link rel="stylesheet" href="../css/main.css?v=5">
    <link rel="stylesheet" href="../css/mobile.css?v=5" media="(max-width: 1024px)">

    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: var(--space-6);
            position: relative;
            z-index: 1;
        }

        .error-logo {
            margin-bottom: var(--space-12);
        }

        .error-logo img {
            height: 36px;
            width: auto;
        }

        .error-code {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--color-primary-400), var(--color-accent-400));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-4);
        }

        .error-title {
            font-size: clamp(1.25rem, 3vw, var(--font-2xl));
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--space-3);
        }

        .error-text {
            font-size: var(--font-lg);
            color: var(--color-text-secondary);
            max-width: 480px;
            margin-bottom: var(--space-10);
            line-height: var(--line-height-relaxed);
        }

        .error-buttons {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="ambient-mesh">
            <div class="mesh-gradient mesh-gradient-1"></div>
            <div class="mesh-gradient mesh-gradient-2"></div>
            <div class="mesh-gradient mesh-gradient-3"></div>
        </div>
        <canvas id="neural-bg-canvas"></canvas>
    </div>

    <main class="error-page" role="main">

        <a href="../" class="error-logo" aria-label="CITECH AI Startseite">
            <img src="../assets/images/logo/citech-logo-white.svg" alt="CITECH AI" class="logo-dark" width="140" height="36">
            <img src="../assets/images/logo/Citech Logo klassisch weißer Hintergrund mit Schatten.jpg" alt="CITECH AI" class="logo-light" width="140" height="36">
        </a>

        <div class="error-code" aria-hidden="true">404</div>

        <h1 class="error-title">Seite nicht gefunden</h1>
        <p class="error-text">Diese Seite existiert leider nicht. Vielleicht wurde sie verschoben oder der Link war fehlerhaft.</p>

        <div class="error-buttons">
            <a href="../" class="btn btn-primary">
                Zur Startseite
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
            </a>
            <a href="kontakt.html" class="btn btn-secondary">Kontakt</a>
        </div>

    </main>

    <script src="../js/main.js?v=5"></script>

</body>
</html>
