<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vielen Dank – CITECH AI</title>
    <meta name="description" content="Ihre Nachricht wurde erfolgreich gesendet. Wir melden uns werktags innerhalb von 12 Stunden bei Ihnen.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="preload" href="../assets/fonts/Inter-VariableFont.woff2" as="font" type="font/woff2" crossorigin>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('../assets/fonts/Inter-VariableFont.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }
    </style>

    <link rel="stylesheet" href="../css/main.css?v=5">
    <link rel="stylesheet" href="../css/mobile.css?v=5" media="(max-width: 1024px)">

    <style>
        .thankyou-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: var(--space-6);
            position: relative;
            z-index: 1;
        }

        .thankyou-logo {
            margin-bottom: var(--space-12);
        }

        .thankyou-logo img {
            height: 36px;
            width: auto;
        }

        .thankyou-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary-400), var(--color-accent-400));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-8);
        }

        .thankyou-icon svg {
            width: 36px;
            height: 36px;
            stroke: #0c1018;
            stroke-width: 2.5;
            fill: none;
        }

        .thankyou-title {
            font-size: clamp(1.5rem, 4vw, var(--font-4xl));
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: var(--space-4);
        }

        .thankyou-text {
            font-size: var(--font-lg);
            color: var(--color-text-secondary);
            max-width: 520px;
            margin-bottom: var(--space-10);
            line-height: var(--line-height-relaxed);
        }

        .thankyou-buttons {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="ambient-mesh">
            <div class="mesh-gradient mesh-gradient-1"></div>
            <div class="mesh-gradient mesh-gradient-2"></div>
            <div class="mesh-gradient mesh-gradient-3"></div>
        </div>
        <canvas id="neural-bg-canvas"></canvas>
    </div>

    <main class="thankyou-page" role="main">

        <a href="../" class="thankyou-logo" aria-label="CITECH AI Startseite">
            <img src="../assets/images/logo/citech-logo-white.svg" alt="CITECH AI" class="logo-dark" width="140" height="36">
            <img src="../assets/images/logo/Citech Logo klassisch weißer Hintergrund mit Schatten.jpg" alt="CITECH AI" class="logo-light" width="140" height="36">
        </a>

        <div class="thankyou-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>

        <h1 class="thankyou-title">Vielen Dank für Ihre Nachricht!</h1>
        <p class="thankyou-text">Wir melden uns werktags innerhalb von 12 Stunden bei Ihnen. Sollte es dringend sein, erreichen Sie uns telefonisch unter <a href="tel:+4920189096817" style="color: var(--color-primary-400);">0201 89096817</a>.</p>

        <div class="thankyou-buttons">
            <a href="../" class="btn btn-primary">
                Zur Startseite
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
            </a>
            <a href="schulungen.html" class="btn btn-secondary">Weitere Module entdecken</a>
        </div>

    </main>

    <script src="../js/main.js?v=5"></script>

</body>
</html>
